<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>龙与地下城 | AI Web TRPG</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Railway Ready AI TRPG</p>
          <h1>龙与地下城</h1>
          <p class="subtitle">角色构建、组队探险、D20 判定与动态叙事集成在同一网页里。</p>
        </div>
        <div class="hero-card">
          <div class="hero-stat">
            <span>玩法循环</span>
            <strong>建卡 → 房间 → 决策 → 掷骰 → 演化</strong>
          </div>
          <div class="hero-stat">
            <span>部署方式</span>
            <strong>Node + Express + Railway</strong>
          </div>
        </div>
      </header>

      <main class="dashboard">
        <section class="panel auth-panel">
          <div class="panel-head">
            <h2>登录与会话</h2>
            <span id="session-status">未登录</span>
          </div>
          <div class="auth-grid">
            <button id="guest-login" class="primary">游客进入</button>
            <input id="username" placeholder="账号名" />
            <input id="password" type="password" placeholder="密码" />
            <div class="auth-actions">
              <button id="register">注册</button>
              <button id="login">登录</button>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>角色创建</h2>
            <span id="portrait-preview">等待选择</span>
          </div>
          <div class="character-grid">
            <div class="form-stack">
              <input id="character-name" placeholder="角色名" />
              <select id="race-select"></select>
              <select id="class-select"></select>
              <input id="skill-input" placeholder="额外技能，逗号分隔" />
              <input id="gear-input" placeholder="额外装备，逗号分隔" />
              <textarea id="backstory-input" placeholder="角色背景"></textarea>
              <button id="create-character" class="primary">创建角色卡</button>
            </div>
            <div class="preview-card">
              <h3>角色卡预览</h3>
              <div id="stat-preview" class="stat-preview"></div>
              <div id="character-list" class="character-list"></div>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>房间与剧本</h2>
            <span>官方模组 + DIY JSON</span>
          </div>
          <div class="room-grid">
            <div class="form-stack">
              <input id="room-name" placeholder="房间名" />
              <select id="character-select"></select>
              <select id="module-select"></select>
              <label class="checkbox-list" id="companion-list"></label>
              <textarea id="script-json" placeholder="可选：粘贴自定义 JSON 剧本"></textarea>
              <button id="create-room" class="primary">创建冒险房间</button>
            </div>
            <div>
              <h3>大厅房间</h3>
              <div id="room-list" class="room-list"></div>
            </div>
          </div>
        </section>

        <section class="play-area">
          <div class="scene-pane panel">
            <div class="panel-head">
              <h2>场景叙事</h2>
              <span id="room-meta">未进入房间</span>
            </div>
            <img id="scene-art" class="scene-art" alt="Scene Art" />
            <div id="scene-title" class="scene-title">等待冒险开始</div>
            <p id="scene-description" class="scene-description">创建或加入房间后，这里会显示当前 AI 场景描述。</p>
            <div id="choice-list" class="choice-list"></div>
            <textarea id="free-action" placeholder="输入自定义行动，例如：尝试潜入侧门"></textarea>
            <button id="submit-free-action">执行自定义行动</button>
          </div>

          <aside class="side-pane">
            <section class="panel">
              <div class="panel-head">
                <h2>队伍与骰子</h2>
                <span id="dice-result">d20 等待掷出</span>
              </div>
              <div id="party-panel" class="party-panel"></div>
            </section>

            <section class="panel">
              <div class="panel-head">
                <h2>行动日志</h2>
                <span>实时滚动</span>
              </div>
              <div id="log-list" class="log-list"></div>
            </section>
          </aside>
        </section>
      </main>
    </div>

    <template id="choice-template">
      <button class="choice-button"></button>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
  </html>
